name: verify

on:
  push:
    branches:
    - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
        total: [4]

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4

    - name: Install dependencies
      run: pip3 install -U online-judge-verify-helper

    - name: Fetch latest changes before verification
      run: git fetch origin main

    - name: Run tests (Parallel Bash Range)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 1. テストファイルを列挙して辞書順にソート
        FILES=$(find . -type f -name "*.test.cpp" | sort)
        
        if [ -z "$FILES" ]; then
          echo "テストファイルが見つかりません。"
          exit 0
        fi

        # 2. ファイル一覧を Bash の配列に格納
        mapfile -t FILE_ARRAY <<< "$FILES"
        TOTAL_FILES=${#FILE_ARRAY[@]}

        # 3. 純粋な整数演算でインデックス（0-based, 半開区間 [START, END)）を計算
        SHARD=${{ matrix.shard }}
        TOTAL=${{ matrix.total }}

        START=$(( SHARD * TOTAL_FILES / TOTAL ))
        END=$(( (SHARD + 1) * TOTAL_FILES / TOTAL ))
        LEN=$(( END - START ))

        # 4. 配列スライス機能で担当分を切り出す
        TARGETS="${FILE_ARRAY[@]:START:LEN}"

        if [ -z "$TARGETS" ]; then
          echo "このシャードに割り当てられたテストファイルはありません。"
        else
          echo "以下のファイルをテストします (インデックス $START から $((END-1)) まで):"
          echo "$TARGETS" | tr ' ' '\n'
          oj-verify run $TARGETS
        fi
